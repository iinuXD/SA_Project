# render.yaml — Deploy to Render.com (Free tier)
# Docs: https://render.com/docs/render-yaml-reference

services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: wimc-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wimc-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false       # Set manually in Render dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: ADMIN_SEED_EMAIL
        sync: false       # Set to your admin KKU email
      - key: FRONTEND_URL
        sync: false       # Set to your frontend Render URL
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    healthCheckPath: /health

  # ── Frontend (React/Vite + nginx) ────────────────────────────────────────────
  - type: web
    name: wimc-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
      - key: VITE_API_URL
        sync: false       # Set to https://wimc-backend.onrender.com/api

# ── PostgreSQL Database ───────────────────────────────────────────────────────
databases:
  - name: wimc-db
    databaseName: wimc
    user: wimc_user
    plan: free
